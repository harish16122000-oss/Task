<body>
  <script>
    var odd=[];
    var even=[];
    
for(var i=1; i<=10; i++){
  if(i%2 !==0){
 
 odd.push(i)

  }
  else{
  even.push(i)
  }
}

document.writeln("Odd: "+ odd +"<br>")
document.writeln("Even: "+ even +"<br>")
  
  
  
  </script>
  <script>

    let name =  "HARISHLINGAM";
    let vowels = "AEIOU";
    var count = 0;
    
    for(i=0; i<name.length; i++){
    if (vowels.includes(name[i])){
      var total = name[i];
     count++;
      document.writeln("Vowels in my name: " + total )
     
    }
    }
    document.writeln("<br>"+"Total number of vowels: " + count)
  </script>
